services:
  postgres:
    image: postgres:16-alpine
    container_name: it-audit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: it_audit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d it_audit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
